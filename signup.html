<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Sphere Academy</title>
  <meta name="description" content="Create your Sphere Academy account and start the 4-month marketing intern training program.">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900,300,italic,500italic,700italic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2025-04-24-loggedhero">
</head>
<body class="page-loaded">

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <div class="logo-icon"><img src="logo.png" alt="Sphere Academy"></div>
          Sphere Academy
        </a>
      </div>
      <ul class="nav-links">
        <li class="nav-mobile-cta"><a href="login.html" class="btn btn-outline">Log In</a></li>
      </ul>
      <div class="nav-cta">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-3px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <a href="login.html" class="btn btn-outline">Log In</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Auth Page -->
  <section class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">
        <div class="logo-icon"><img src="logo.png" alt="Sphere Academy"></div>
        Sphere Academy
      </a>
      <h1>Create your account</h1>
      <p class="auth-subtitle">Start your 4-month marketing journey</p>

      <div id="signupError" style="display:none; padding:12px 16px; border-radius:10px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-size:0.85rem; margin-bottom:16px; text-align:center;"></div>
      <form class="auth-form" id="signupForm">
        <div class="form-group">
          <label for="fullname">Full name</label>
          <input type="text" id="fullname" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="signupUsername">Username <span style="color:var(--text-light); font-weight:400; font-size:0.8rem;">(you'll use this to log in)</span></label>
          <input type="text" id="signupUsername" placeholder="Choose a username" required minlength="3" pattern="[a-zA-Z0-9_]+" title="Letters, numbers, and underscores only" autocomplete="username">
          <small style="color:var(--text-light); font-size:0.78rem;">3+ characters, letters/numbers/underscores only</small>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required minlength="8" aria-describedby="passwordHelp">
          <small id="passwordHelp" style="color:var(--text-light); font-size:0.78rem;">Minimum 8 characters</small>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password" required minlength="8">
        </div>
        <div class="form-row">
          <label><input type="checkbox" required> I agree to the <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-divider">or sign up with</div>

      <div class="auth-social">
        <button type="button" id="googleSignIn" class="oauth-btn" style="flex:1;"><span style="color:#4285F4;font-weight:700;">G</span> &nbsp; Continue with Google</button>
      </div>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </section>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js?v=2025-04-24-loggedhero"></script>
</body>
</html>

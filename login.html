<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Sphere Academy</title>
  <meta name="description" content="Log in to your Sphere Academy account to access the Marketing Intern Training Program.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2025-04-24-arrows">
</head>
<body class="page-loaded">

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <div class="logo-icon"><img src="logo.png" alt="Sphere Academy"></div>
          Sphere Academy
        </a>
      </div>
      <ul class="nav-links">
        <li class="nav-mobile-cta"><a href="login.html" class="btn btn-outline">Log In</a></li>
      </ul>
      <div class="nav-cta">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">&#9790;</button>
        <a href="login.html" class="btn btn-outline">Log In</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Auth Page -->
  <section class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">
        <div class="logo-icon"><img src="logo.png" alt="Sphere Academy"></div>
        Sphere Academy
      </a>
      <h1>Welcome</h1>
      <p class="auth-subtitle">Log in to continue your training</p>

      <div id="loginError" style="display:none; padding:12px 16px; border-radius:10px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-size:0.85rem; margin-bottom:16px; text-align:center;"></div>
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <div class="form-row">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="auth-social">
        <button type="button" id="googleSignIn" class="oauth-btn" style="flex:1;"><span style="color:#4285F4;font-weight:700;">G</span> &nbsp; Continue with Google</button>
      </div>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </p>
    </div>
  </section>

  <!-- Firebase SDK (compat mode for easy drop-in usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="script.js?v=2025-04-24-arrows"></script>
</body>
</html>
